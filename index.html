<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coronate: chess tournament manager</title>
  <!-- FAVICONS -->
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script type="module" src="/src/Main.res.mjs"></script>
<style>
    #sccl-fab {
        position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px;
        background: #0071e3; color: white; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        z-index: 999999; cursor: pointer; border: none;
    }
    #sccl-screen {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #f5f5f7; z-index: 999998; overflow-y: auto; padding: 20px; box-sizing: border-box;
    }
    .sccl-card { background: white; padding: 20px; border-radius: 12px; max-width: 1000px; margin: 40px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); font-family: sans-serif; }
    .sccl-close { position: absolute; top: 20px; right: 20px; background: #3a3a3c; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    .sccl-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
    .sccl-table th { background: #f5f5f7; padding: 12px; text-align: left; color: #86868b; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #ddd; }
    .sccl-table td { padding: 12px; border-bottom: 1px solid #eee; }
    .sccl-netto { font-weight: bold; color: #0071e3; background: #f1f8ff; }
</style>

<button id="sccl-fab" onclick="toggleSCCL()">🏆</button>

<div id="sccl-screen">
    <button class="sccl-close" onclick="toggleSCCL()">Sluiten ✕</button>
    <div class="sccl-card">
        <h2>🏆 SCCL Netto Rating</h2>
        <div id="sccl-table-render">
            <p>Geen data. Importeer eerst een toernooi via de normale 'Options' knop.</p>
        </div>
    </div>
</div>

<script>
function toggleSCCL() {
    const screen = document.getElementById('sccl-screen');
    const isVisible = screen.style.display === 'block';
    screen.style.display = isVisible ? 'none' : 'block';
    if (!isVisible) updateSCCL();
}

function updateSCCL() {
    const request = indexedDB.open("coronate");
    request.onsuccess = (e) => {
        const db = e.target.result;
        try {
            const tx = db.transaction(["tournaments", "players"], "readonly");
            tx.objectStore("tournaments").getAll().onsuccess = (ev) => {
                const tourney = ev.target.result[0];
                tx.objectStore("players").getAll().onsuccess = (ev2) => {
                    const players = {};
                    ev2.target.result.forEach(p => players[p.id] = p);
                    if (tourney) renderSCCL(tourney, players);
                };
            };
        } catch(err) { console.log("Database leeg of bezig..."); }
    };
}

function renderSCCL(tourney, players) {
    const rounds = tourney.roundList || [];
    const totalRounds = rounds.length;
    let list = Object.keys(players).filter(id => !id.includes("DUMMY")).map(id => {
        let p = players[id], wG=0, bG=0, won=0, dr=0, loss=0, pres=0;
        rounds.forEach(r => {
            const m = r.find(m => m.whiteId === id || m.blackId === id);
            if (m) {
                pres++;
                if (m.whiteId === id) {
                    wG++; if (m.result==='whiteWon') won++; else if (m.result==='blackWon') loss++; else if (m.result==='draw') dr++;
                } else {
                    bG++; if (m.result==='blackWon') won++; else if (m.result==='whiteWon') loss++; else if (m.result==='draw') dr++;
                }
            }
        });
        let x = (totalRounds - pres) - 2;
        let aftrek = x > 0 ? (x * (x + 1)) / 2 : 0;
        return { name: (p.firstName + " " + (p.lastName || "")).trim(), rat: p.rating || 0, wG, bG, won, dr, loss, gem: (totalRounds-pres), aftrek, netto: (p.rating || 0) - aftrek };
    }).sort((a, b) => b.netto - a.netto);

    let html = `<table class="sccl-table"><thead><tr><th>Pos</th><th>Naam</th><th>Rating</th><th>Wit</th><th>Zwart</th><th>Winst</th><th>Remise</th><th>Verlies</th><th>Gemist</th><th>Aftrek</th><th class="sccl-netto">Netto</th></tr></thead><tbody>`;
    list.forEach((s, i) => {
        html += `<tr><td>${i+1}</td><td><b>${s.name}</b></td><td>${s.rating}</td><td>${s.wG}</td><td>${s.bG}</td><td>${s.won}</td><td>${s.dr}</td><td>${s.loss}</td><td>${s.gem}</td><td style="color:#ff3b30">-${s.aftrek}</td><td class="sccl-netto">${s.netto}</td></tr>`;
    });
    document.getElementById('sccl-table-render').innerHTML = html + "</tbody></table>";
}
</script>
</body>

</html>
