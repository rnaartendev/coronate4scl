<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coronate: chess tournament manager</title>
  <!-- FAVICONS -->
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script type="module" src="/src/Main.res.mjs"></script>

<style>
    #sccl-fab {
        position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px;
        background: #0071e3; color: white; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        z-index: 999999; cursor: pointer; border: none; transition: transform 0.1s;
    }
    #sccl-fab:active { transform: scale(0.9); }
    #sccl-screen {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #f5f5f7; z-index: 999998; overflow-y: auto; padding: 15px; box-sizing: border-box;
    }
    .sccl-card { background: white; padding: 20px; border-radius: 16px; max-width: 1000px; margin: 40px auto; box-shadow: 0 10px 40px rgba(0,0,0,0.1); font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    .sccl-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .sccl-close { background: #3a3a3c; color: white; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; }
    .sccl-sync-btn { background: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-right: 10px; }
    .sccl-table-container { overflow-x: auto; }
    .sccl-table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 600px; }
    .sccl-table th { background: #f5f5f7; padding: 12px 10px; text-align: left; color: #86868b; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #eee; }
    .sccl-table td { padding: 12px 10px; border-bottom: 1px solid #f0f0f0; color: #1d1d1f; }
    .sccl-netto { font-weight: 800; color: #0071e3; background: #f1f8ff; text-align: center; font-size: 15px; }
    .sccl-deduction { color: #ff3b30; font-size: 12px; font-weight: normal; }
</style>

<button id="sccl-fab" onclick="toggleSCCL()">🏆</button>

<div id="sccl-screen">
    <div class="sccl-card">
        <div class="sccl-header">
            <h2 style="margin:0; font-size: 24px; color: #1d1d1f;">🏆 C4SCL Stand</h2>
            <div>
                <button class="sccl-sync-btn" onclick="syncToApp()">SYNC ⚡</button>
                <button class="sccl-close" onclick="toggleSCCL()">SLUITEN ✕</button>
            </div>
        </div>
        <div id="sccl-table-render" class="sccl-table-container">
            <p style="text-align: center; padding: 20px; color: #666;">Data laden...</p>
        </div>
    </div>
</div>

<script>
let lastCalculatedStats = [];

function toggleSCCL() {
    const screen = document.getElementById('sccl-screen');
    const isVisible = screen.style.display === 'block';
    screen.style.display = isVisible ? 'none' : 'block';
    if (!isVisible) updateSCCL();
}

function updateSCCL() {
    const request = indexedDB.open("Coronate");
    request.onsuccess = (e) => {
        const db = e.target.result;
        try {
            const tx = db.transaction(["Tournaments", "Players"], "readonly");
            tx.objectStore("Tournaments").getAll().onsuccess = (ev) => {
                const tourney = ev.target.result[0];
                tx.objectStore("Players").getAll().onsuccess = (ev2) => {
                    const players = {};
                    ev2.target.result.forEach(p => { players[p.id || p.Id] = p; });
                    if (tourney) renderSCCL(tourney, players);
                };
            };
        } catch(err) {
            document.getElementById('sccl-table-render').innerHTML = "<p style='color:red; padding:20px;'>Fout: Importeer eerst een toernooi via 'Options'.</p>";
        }
    };
}

function renderSCCL(tourney, players) {
    const rounds = tourney.RoundList || tourney.roundList || [];
    const totalRounds = rounds.length;
    
    lastCalculatedStats = Object.keys(players).filter(id => !id.includes("DUMMY")).map(id => {
        let p = players[id];
        let fName = p.FirstName || p.firstName || "";
        let lName = p.LastName || p.lastName || "";
        let rating = p.Rating || p.rating || 0;
        
        let pres = 0;
        rounds.forEach(r => {
            if (r.find(m => (m.WhiteId || m.whiteId) === id || (m.BlackId || m.blackId) === id)) pres++;
        });

        let gemist = totalRounds - pres;
        let x = gemist - 2;
        let aftrek = x > 0 ? (x * (x + 1)) / 2 : 0;
        let netto = rating - aftrek;

        return { id, name: (fName + " " + lName).trim(), rating, aftrek, netto, gemist };
    }).sort((a, b) => b.netto - a.netto);

    let html = `<table class="sccl-table"><thead><tr>
        <th>Pos</th>
        <th>Naam</th>
        <th>Rating (Aftrek)</th>
        <th style="text-align:center">Gemist</th>
        <th class="sccl-netto">Netto Rating</th>
    </tr></thead><tbody>`;
    
    lastCalculatedStats.forEach((s, i) => {
        html += `<tr>
            <td>${i+1}</td>
            <td><b>${s.name}</b></td>
            <td>${Math.round(s.rating)} <span class="sccl-deduction">(-${s.aftrek})</span></td>
            <td style="text-align:center">${s.gemist}</td>
            <td class="sccl-netto">${Math.round(s.netto)}</td>
        </tr>`;
    });
    document.getElementById('sccl-table-render').innerHTML = html + "</tbody></table>";
}

function syncToApp() {
    if (!confirm("Wil je de Netto ratings opslaan in de app voor de volgende paring?")) return;
    const request = indexedDB.open("Coronate");
    request.onsuccess = (e) => {
        const db = e.target.result;
        const tx = db.transaction(["Players"], "readwrite");
        const store = tx.objectStore("Players");
        lastCalculatedStats.forEach(stat => {
            const getReq = store.get(stat.id);
            getReq.onsuccess = () => {
                const player = getReq.result;
                if (player) {
                    if (player.hasOwnProperty('Rating')) player.Rating = stat.netto;
                    if (player.hasOwnProperty('rating')) player.rating = stat.netto;
                    store.put(player);
                }
            };
        });
        tx.oncomplete = () => { alert("Gereed! Ververs de pagina."); location.reload(); };
    };
}
</script>
  
</body>

</html>
